iris.features.required = SSBO COMPUTE_SHADERS CUSTOM_IMAGES

frustum.culling = false

clouds = off
sun = false
moon = false
starts = false
sky = false
stars = false
oldHandLight = false

allowConcurrentCompute = false

texture.composite.colortex10 = minecraft:textures/atlas/blocks.png
texture.composite.colortex11 = minecraft:textures/atlas/blocks_s.png
texture.composite.colortex12 = minecraft:textures/atlas/blocks_n.png

// Entities
// 12 * 1024 + 8, about 12 KB, entity texture indexing
bufferObject.1 = 12296

// Blocks
// 36 * 1048576, about 25 MB, vertex storage
bufferObject.2 = 25165824 
// 8, triangle + vertex count
bufferObject.3 = 8
// 16 * 1048576, about 17 MB, morton codes + indices
bufferObject.4 = 16777216
// 4 * 1048576 + 1024, about 4 MB, histogram + totals
bufferObject.5 = 4195328
// 30 * 1048576 * 2, about 63 MB, bvh buffer
bufferObject.6 = 62914560
// 4 * 1048576 + 4, about 4 MB, bvh node counters
bufferObject.7 = 4194308

image.entityatlas = entityAtlas rgba rgba8 float false false 4096 4096
image.skyconstants = skyConstants rgba rgba8 float false false 2 2

// Bloom settings
#if BLOOM_QUALITY == 0
size.buffer.colortex5 = 0.25 0.25
size.buffer.colortex6 = 0.25 0.25
size.buffer.colortex7 = 0.25 0.25
#endif
#if BLOOM_QUALITY == 1
size.buffer.colortex5 = 0.5 0.5
size.buffer.colortex6 = 0.5 0.5
size.buffer.colortex7 = 0.5 0.5
#endif
#if BLOOM_QUALITY == 2
size.buffer.colortex5 = 0.75 0.75
size.buffer.colortex6 = 0.75 0.75
size.buffer.colortex7 = 0.75 0.75
#endif

sliders = BLOOM_QUALITY BLOOM_RADIUS BLOOM_STEP_SIZE BLOOM_INTENSITY BLOOM_THREASHOLD